<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Finder</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3a;
      --text: #e4e4ef;
      --text-dim: #8888a0;
      --accent: #6366f1;
      --accent-dim: #4f46e5;
      --accent-glow: rgba(99, 102, 241, 0.15);
      --green: #22c55e;
      --yellow: #eab308;
      --red: #ef4444;
      --cyan: #06b6d4;
      --radius: 12px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .header { text-align: center; padding: 3rem 1rem 1.5rem; }
    .header h1 {
      font-size: 2rem; font-weight: 700; letter-spacing: -0.03em;
      background: linear-gradient(135deg, var(--accent), var(--cyan));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p { color: var(--text-dim); font-size: 0.875rem; margin-top: 0.25rem; }

    /* Search */
    .search-area { max-width: 740px; margin: 0 auto; padding: 0 1rem; }
    .search-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: flex-end;
    }
    .field { display: flex; flex-direction: column; gap: 0.35rem; flex: 1; min-width: 140px; }
    .field label {
      font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-dim);
    }
    .field input, .field select {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.6rem 0.85rem; font-size: 0.9rem; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .field input::placeholder { color: var(--text-dim); opacity: 0.5; }
    .field select option { background: var(--surface2); color: var(--text); }

    .btn-search {
      background: linear-gradient(135deg, var(--accent), var(--accent-dim)); color: #fff; border: none;
      border-radius: 8px; padding: 0.6rem 1.6rem; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: transform 0.1s, box-shadow 0.2s; white-space: nowrap; height: fit-content;
    }
    .btn-search:hover { transform: translateY(-1px); box-shadow: 0 4px 20px var(--accent-glow); }
    .btn-search:active { transform: scale(0.97); }
    .btn-search:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* Config toggle */
    .config-toggle {
      max-width: 740px; margin: 0.5rem auto 0; padding: 0 1rem;
    }
    .config-toggle summary {
      font-size: 0.75rem; color: var(--text-dim); cursor: pointer; list-style: none;
      text-align: right;
    }
    .config-toggle summary::-webkit-details-marker { display: none; }
    .config-toggle summary::before { content: '⚙ '; }
    .config-panel {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.25rem; margin-top: 0.5rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem;
    }
    .config-panel .field { min-width: 0; }
    .config-panel .field input { font-size: 0.8rem; padding: 0.45rem 0.65rem; }
    .config-note { grid-column: 1 / -1; font-size: 0.7rem; color: var(--text-dim); }

    /* Progress */
    .progress-area { max-width: 740px; margin: 1rem auto 0; padding: 0 1rem; display: none; }
    .progress-area.active { display: block; }
    .progress-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; }
    .progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }
    .progress-header span { font-size: 0.85rem; color: var(--text-dim); }
    .progress-header .count { color: var(--accent); font-weight: 600; font-variant-numeric: tabular-nums; }
    .progress-bar-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 0.75rem; }
    .progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--cyan)); border-radius: 3px; transition: width 0.3s ease; width: 0%; }
    .source-grid { display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .source-tag {
      font-size: 0.65rem; padding: 0.2rem 0.5rem; border-radius: 4px;
      background: var(--surface2); color: var(--text-dim); transition: all 0.3s; font-variant-numeric: tabular-nums;
    }
    .source-tag.active { background: rgba(99,102,241,0.15); color: var(--accent); }
    .source-tag.done { background: rgba(34, 197, 94, 0.12); color: var(--green); }
    .source-tag.zero { opacity: 0.4; }
    .source-tag.error { background: rgba(239,68,68,0.12); color: var(--red); }

    /* Results */
    .results-area { max-width: 1100px; margin: 1.5rem auto 3rem; padding: 0 1rem; display: none; }
    .results-area.active { display: block; }
    .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; flex-wrap: wrap; gap: 0.5rem; }
    .results-header h2 { font-size: 1.1rem; font-weight: 600; }
    .results-header h2 span { color: var(--accent); }
    .results-tools { display: flex; gap: 0.5rem; align-items: center; }
    .filter-input {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.4rem 0.7rem; font-size: 0.8rem; color: var(--text); outline: none; width: 200px;
    }
    .filter-input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .btn-export {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      padding: 0.4rem 0.85rem; font-size: 0.8rem; font-weight: 500; color: var(--text-dim);
      cursor: pointer; transition: all 0.2s;
    }
    .btn-export:hover { border-color: var(--accent); color: var(--accent); }

    /* Table */
    .job-table { width: 100%; border-collapse: separate; border-spacing: 0; }
    .job-table thead th {
      background: var(--surface); font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--text-dim); padding: 0.65rem 0.75rem; text-align: left;
      position: sticky; top: 0; z-index: 1; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none;
    }
    .job-table thead th:hover { color: var(--accent); }
    .job-table thead th:first-child { border-radius: var(--radius) 0 0 0; }
    .job-table thead th:last-child { border-radius: 0 var(--radius) 0 0; }
    .job-table tbody tr { transition: background 0.15s; }
    .job-table tbody tr:hover { background: var(--accent-glow); }
    .job-table tbody td { padding: 0.6rem 0.75rem; font-size: 0.82rem; border-bottom: 1px solid var(--border); vertical-align: top; }
    .job-table tbody tr:last-child td { border-bottom: none; }
    .job-title-link { color: var(--cyan); text-decoration: none; font-weight: 500; }
    .job-title-link:hover { text-decoration: underline; }
    .job-company { color: var(--text); font-weight: 500; }
    .job-location { color: var(--text-dim); }
    .job-salary { color: var(--yellow); font-weight: 500; font-size: 0.78rem; }
    .job-distance { color: var(--accent); font-variant-numeric: tabular-nums; }
    .job-source { font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 4px; background: var(--surface2); color: var(--text-dim); white-space: nowrap; }
    .job-remote { font-size: 0.65rem; padding: 0.1rem 0.35rem; border-radius: 3px; background: rgba(34,197,94,0.12); color: var(--green); margin-left: 0.3rem; }

    /* Pagination */
    .pagination { display: flex; justify-content: center; gap: 0.35rem; margin-top: 1rem; }
    .pagination button {
      background: var(--surface); border: 1px solid var(--border); border-radius: 6px;
      padding: 0.35rem 0.7rem; font-size: 0.8rem; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
    }
    .pagination button:hover { border-color: var(--accent); color: var(--accent); }
    .pagination button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .pagination button:disabled { opacity: 0.3; cursor: not-allowed; }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 0.4rem; vertical-align: middle; }

    @media (max-width: 600px) {
      .search-card { flex-direction: column; }
      .field { min-width: 100%; }
      .btn-search { width: 100%; }
      .filter-input { width: 130px; }
      .config-panel { grid-template-columns: 1fr; }
      .hide-mobile { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <h1>Job Finder</h1>
  <p>30+ live API sources &middot; ATS crawlers &middot; every job in your area</p>
</div>

<div class="search-area">
  <form class="search-card" id="searchForm" onsubmit="startSearch(event)">
    <div class="field" style="flex:2">
      <label for="query">Keywords</label>
      <input type="text" id="query" placeholder="software engineer, nurse, data scientist..." autofocus>
    </div>
    <div class="field" style="flex:1.5">
      <label for="location">Location</label>
      <input type="text" id="location" placeholder="Austin, TX" required>
    </div>
    <div class="field" style="flex:0.5; min-width:90px">
      <label for="radius">Radius (mi)</label>
      <input type="number" id="radius" value="25" min="1" max="9999">
    </div>
    <button class="btn-search" type="submit" id="searchBtn">Search</button>
  </form>
</div>

<details class="config-toggle">
  <summary>API Keys (optional, more results)</summary>
  <div class="config-panel">
    <div class="field"><label>Adzuna App ID</label><input id="cfg_adzuna_id" placeholder="adzuna app_id"></div>
    <div class="field"><label>Adzuna API Key</label><input id="cfg_adzuna_key" placeholder="adzuna app_key"></div>
    <div class="field"><label>RapidAPI Key (JSearch)</label><input id="cfg_rapidapi" placeholder="rapidapi key"></div>
    <div class="field"><label>Jooble API Key</label><input id="cfg_jooble" placeholder="jooble key"></div>
    <p class="config-note">Keys are saved in your browser's localStorage. All sources without keys still work.</p>
  </div>
</details>

<div class="progress-area" id="progressArea">
  <div class="progress-card">
    <div class="progress-header">
      <span id="progressStatus"><span class="spinner"></span>Scanning sources...</span>
      <span class="count" id="progressCount">0 / 0</span>
    </div>
    <div class="progress-bar-track"><div class="progress-bar-fill" id="progressBar"></div></div>
    <div class="source-grid" id="sourceGrid"></div>
  </div>
</div>

<div class="results-area" id="resultsArea">
  <div class="results-header">
    <h2><span id="resultCount">0</span> jobs found</h2>
    <div class="results-tools">
      <input type="text" class="filter-input" id="filterInput" placeholder="Filter results..." oninput="filterResults()">
      <button class="btn-export" onclick="exportCSV()">CSV</button>
      <button class="btn-export" onclick="exportJSON()">JSON</button>
    </div>
  </div>
  <table class="job-table">
    <thead><tr>
      <th onclick="sortBy('title')">Title</th>
      <th onclick="sortBy('company')">Company</th>
      <th onclick="sortBy('location')">Location</th>
      <th onclick="sortBy('salary')" class="hide-mobile">Salary</th>
      <th onclick="sortBy('distance_miles')">Dist</th>
      <th onclick="sortBy('source')">Source</th>
    </tr></thead>
    <tbody id="jobTableBody"></tbody>
  </table>
  <div class="pagination" id="pagination"></div>
</div>

<script>
// =========================================================================
//  STATE
// =========================================================================
let allJobs = [], filteredJobs = [], currentPage = 0;
let currentSort = { key: 'distance_miles', asc: true };
let abortController = null;
const PAGE_SIZE = 50;

// =========================================================================
//  CONFIG (localStorage)
// =========================================================================
function loadCfg() {
  try { return JSON.parse(localStorage.getItem('jf_config') || '{}'); } catch { return {}; }
}
function saveCfg() {
  const cfg = {
    adzuna_id: $('cfg_adzuna_id').value.trim(),
    adzuna_key: $('cfg_adzuna_key').value.trim(),
    rapidapi: $('cfg_rapidapi').value.trim(),
    jooble: $('cfg_jooble').value.trim(),
  };
  localStorage.setItem('jf_config', JSON.stringify(cfg));
  return cfg;
}
function restoreCfg() {
  const c = loadCfg();
  $('cfg_adzuna_id').value = c.adzuna_id || '';
  $('cfg_adzuna_key').value = c.adzuna_key || '';
  $('cfg_rapidapi').value = c.rapidapi || '';
  $('cfg_jooble').value = c.jooble || '';
}
document.addEventListener('DOMContentLoaded', restoreCfg);

// =========================================================================
//  GEOCODING (Nominatim — free, no key)
// =========================================================================
const geoCache = {};
async function geocode(loc) {
  if (geoCache[loc]) return geoCache[loc];
  try {
    const r = await fetch(`https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(loc)}`,
      { headers: { 'User-Agent': 'job-finder-static/2.0' } });
    const d = await r.json();
    if (d.length) { const c = { lat: +d[0].lat, lon: +d[0].lon }; geoCache[loc] = c; return c; }
  } catch {}
  return null;
}

function haversine(lat1, lon1, lat2, lon2) {
  const R = 3958.8; // miles
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// =========================================================================
//  FETCH HELPERS
// =========================================================================
const PROXY = 'https://api.allorigins.win/raw?url=';

async function fetchJSON(url, opts = {}) {
  const ctrl = abortController;
  try {
    const r = await fetch(url, { signal: ctrl?.signal, ...opts });
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

async function fetchProxy(url, opts = {}) {
  return fetchJSON(PROXY + encodeURIComponent(url), opts);
}

async function fetchText(url) {
  const ctrl = abortController;
  try {
    const r = await fetch(PROXY + encodeURIComponent(url), { signal: ctrl?.signal });
    if (!r.ok) return null;
    return await r.text();
  } catch { return null; }
}

function stripHTML(s) {
  if (!s) return '';
  const d = document.createElement('div'); d.innerHTML = s;
  return d.textContent || '';
}

// =========================================================================
//  GREENHOUSE / LEVER / ASHBY COMPANY LISTS
// =========================================================================
const GH_BOARDS = [
  'airbnb','airtable','anduril','asana','brex','canva','cloudflare','coinbase','databricks','datadog',
  'discord','doordash','dropbox','duolingo','figma','gitlab','gusto','hashicorp','instacart','lattice',
  'linear','loom','lyft','miro','netlify','notion','nytimes','okta','openai','pagerduty','palantir',
  'pinterestcareers','plaid','ramp','reddit','remitly','retool','rippling','robinhood','scale',
  'seatgeek','sentry','shopify','snap','sourcegraph','spotify','square','stripe','supabase',
  'sweetgreen','tiktok','twitch','twilio','vercel','verkada','vimeo','wealthfront','whatnot',
  'wikimedia','zipline',
];
const LEVER_BOARDS = [
  'Netflix','figma','verkada','anthropic','netlify','mux','postman','relativity','cockroachlabs',
  'clearbit','webflow','nerdwallet','census','demandbase','benchling','segment','truework',
  'lob','dbt-labs','modern-treasury','prefect','temporal','snyk','tailscale',
];
const ASHBY_BOARDS = ['ramp','notion','linear','vercel','supabase','resend','mintlify','cal','neon','inngest'];

// =========================================================================
//  SOURCE DEFINITIONS
// =========================================================================

function buildSources(query, location, radiusMi, cfg) {
  const q = encodeURIComponent(query);
  const loc = encodeURIComponent(location);
  const sources = {};

  // --- A: Free APIs ---

  // Remotive (CORS-friendly)
  sources['Remotive'] = async () => {
    const d = await fetchJSON(`https://remotive.com/api/remote-jobs?search=${q}&limit=200`);
    return (d?.jobs || []).map(j => ({
      title: j.title, company: j.company_name, location: j.candidate_required_location || 'Remote',
      url: j.url, source: 'Remotive', description: stripHTML(j.description).slice(0,500),
      salary: j.salary || '', date_posted: (j.publication_date||'').slice(0,10), remote: true,
    }));
  };

  // Arbeitnow (CORS-friendly)
  sources['Arbeitnow'] = async () => {
    let jobs = [];
    for (let p = 1; p <= 3; p++) {
      const d = await fetchJSON(`https://www.arbeitnow.com/api/job-board-api?page=${p}`);
      if (!d?.data) break;
      const ql = query.toLowerCase();
      for (const j of d.data) {
        if (ql && !j.title.toLowerCase().includes(ql) && !(j.description||'').toLowerCase().includes(ql)) continue;
        jobs.push({ title: j.title, company: j.company_name, location: j.location, url: j.url,
          source: 'Arbeitnow', date_posted: (j.created_at||'').slice(0,10), remote: !!j.remote });
      }
      if (!d.links?.next) break;
    }
    return jobs;
  };

  // Jobicy (CORS-friendly)
  sources['Jobicy'] = async () => {
    const d = await fetchJSON(`https://jobicy.com/api/v2/remote-jobs?count=50&tag=${q}`);
    return (d?.jobs || []).map(j => ({
      title: j.jobTitle, company: j.companyName, location: j.jobGeo || 'Remote',
      url: j.url, source: 'Jobicy', description: (j.jobExcerpt||'').slice(0,500),
      date_posted: (j.pubDate||'').slice(0,10), remote: true,
    }));
  };

  // The Muse (CORS-friendly)
  sources['The Muse'] = async () => {
    let jobs = [];
    for (let p = 0; p < 3; p++) {
      const d = await fetchJSON(`https://www.themuse.com/api/public/jobs?page=${p}&descending=true${query ? '&category='+q : ''}`);
      if (!d?.results) break;
      for (const j of d.results) {
        const loc = j.locations?.[0]?.name || '';
        jobs.push({ title: j.name, company: j.company?.name || '', location: loc,
          url: j.refs?.landing_page || '', source: 'The Muse',
          description: stripHTML(j.contents||'').slice(0,500), date_posted: (j.publication_date||'').slice(0,10) });
      }
      if (p >= (d.page_count||1) - 1) break;
    }
    return jobs;
  };

  // USAJobs (CORS-friendly)
  sources['USAJobs'] = async () => {
    const d = await fetchJSON(`https://data.usajobs.gov/api/search?Keyword=${q}&LocationName=${loc}&Radius=${radiusMi}&ResultsPerPage=100`, {
      headers: { 'User-Agent': 'job-finder-static/2.0', 'Authorization-Key': '' }
    });
    if (!d) return [];
    return (d.SearchResult?.SearchResultItems || []).map(item => {
      const m = item.MatchedObjectDescriptor || {};
      const locs = m.PositionLocation || [];
      const sal = m.PositionRemuneration?.[0];
      return {
        title: m.PositionTitle, company: m.OrganizationName || 'US Government',
        location: locs[0]?.LocationName || '', url: m.PositionURI || '', source: 'USAJobs',
        salary: sal ? `$${sal.MinimumRange} - $${sal.MaximumRange} ${sal.RateIntervalCode||''}` : '',
        date_posted: (m.PublicationStartDate||'').slice(0,10),
        lat: locs[0]?.Latitude ? +locs[0].Latitude : null,
        lon: locs[0]?.Longitude ? +locs[0].Longitude : null,
      };
    });
  };

  // FindWork.dev
  sources['FindWork.dev'] = async () => {
    const d = await fetchProxy(`https://findwork.dev/api/jobs/?search=${q}&order_by=-date_posted`);
    return (d?.results || []).map(j => ({
      title: j.role, company: j.company_name, location: j.location || 'Remote',
      url: j.url, source: 'FindWork.dev', description: (j.text||'').slice(0,500),
      date_posted: (j.date_posted||'').slice(0,10), remote: !!j.remote,
    }));
  };

  // Himalayas
  sources['Himalayas'] = async () => {
    const d = await fetchJSON(`https://himalayas.app/jobs/api?limit=100&q=${q}`);
    return (d?.jobs || []).map(j => ({
      title: j.title, company: j.companyName, location: j.location || 'Remote',
      url: `https://himalayas.app/jobs/${j.slug||''}`, source: 'Himalayas',
      description: (j.excerpt||'').slice(0,500), date_posted: (j.pubDate||'').slice(0,10), remote: true,
    }));
  };

  // RemoteOK
  sources['RemoteOK'] = async () => {
    const d = await fetchProxy('https://remoteok.com/api');
    if (!d || !Array.isArray(d)) return [];
    const ql = query.toLowerCase();
    return d.slice(1).filter(j => {
      if (!ql) return true;
      return (j.position||'').toLowerCase().includes(ql) || (j.tags||[]).join(' ').toLowerCase().includes(ql);
    }).map(j => {
      let sal = '';
      if (j.salary_min && j.salary_max) sal = `$${(+j.salary_min).toLocaleString()} - $${(+j.salary_max).toLocaleString()}`;
      return {
        title: j.position, company: j.company, location: j.location || 'Remote',
        url: j.url, source: 'RemoteOK', description: stripHTML(j.description||'').slice(0,500),
        salary: sal, date_posted: (j.date||'').slice(0,10), remote: true,
      };
    });
  };

  // WorkingNomads
  sources['WorkingNomads'] = async () => {
    const d = await fetchProxy('https://www.workingnomads.com/api/exposed_jobs/');
    if (!d || !Array.isArray(d)) return [];
    const ql = query.toLowerCase();
    return d.filter(j => !ql || (j.title||'').toLowerCase().includes(ql) || (j.description||'').toLowerCase().includes(ql))
      .map(j => ({
        title: j.title, company: j.company_name, location: j.location || 'Remote',
        url: j.url, source: 'WorkingNomads', description: stripHTML(j.description||'').slice(0,500),
        date_posted: (j.pub_date||'').slice(0,10), remote: true,
      }));
  };

  // HN Who is Hiring
  sources['HN Hiring'] = async () => {
    const search = await fetchJSON(`https://hn.algolia.com/api/v1/search_by_date?query=${encodeURIComponent('Ask HN: Who is hiring')}&tags=story&hitsPerPage=1`);
    const storyId = search?.hits?.[0]?.objectID;
    if (!storyId) return [];
    const story = await fetchJSON(`https://hn.algolia.com/api/v1/items/${storyId}`);
    if (!story?.children) return [];
    const ql = query.toLowerCase();
    return story.children.slice(0, 200).filter(c => c.text).map(c => {
      const text = stripHTML(c.text);
      if (ql && !text.toLowerCase().includes(ql)) return null;
      const parts = text.split('\n')[0].split('|').map(s => s.trim());
      return {
        title: parts[1] || parts[0]?.slice(0,100) || 'HN Job',
        company: parts[0] || '', location: parts[2] || '',
        url: `https://news.ycombinator.com/item?id=${c.id || storyId}`,
        source: 'HN Hiring', description: text.slice(0,500),
        remote: /\bremote\b/i.test(text),
      };
    }).filter(Boolean);
  };

  // Adzuna (needs key)
  if (cfg.adzuna_id && cfg.adzuna_key) {
    sources['Adzuna'] = async () => {
      let jobs = [];
      for (let p = 1; p <= 3; p++) {
        const d = await fetchProxy(`https://api.adzuna.com/v1/api/jobs/us/search/${p}?app_id=${cfg.adzuna_id}&app_key=${cfg.adzuna_key}&results_per_page=50&what=${q}&where=${loc}&distance=${Math.round(radiusMi*1.6)}&sort_by=date`);
        if (!d?.results) break;
        for (const r of d.results) {
          let sal = '';
          if (r.salary_min && r.salary_max) sal = `$${Math.round(r.salary_min).toLocaleString()} - $${Math.round(r.salary_max).toLocaleString()}`;
          jobs.push({ title: r.title?.trim(), company: r.company?.display_name || '', location: r.location?.display_name || '',
            url: r.redirect_url, source: 'Adzuna', description: (r.description||'').slice(0,500), salary: sal,
            date_posted: (r.created||'').slice(0,10), lat: r.latitude, lon: r.longitude });
        }
        if (d.results.length < 50) break;
      }
      return jobs;
    };
  }

  // JSearch (needs RapidAPI key)
  if (cfg.rapidapi) {
    sources['JSearch'] = async () => {
      let jobs = [];
      for (let p = 1; p <= 3; p++) {
        const d = await fetchJSON(`https://jsearch.p.rapidapi.com/search?query=${encodeURIComponent(query+' in '+location)}&page=${p}&num_pages=1&date_posted=month&radius=${radiusMi}`, {
          headers: { 'X-RapidAPI-Key': cfg.rapidapi, 'X-RapidAPI-Host': 'jsearch.p.rapidapi.com' }
        });
        if (!d?.data) break;
        for (const r of d.data) {
          let sal = '';
          if (r.job_min_salary && r.job_max_salary) sal = `$${(+r.job_min_salary).toLocaleString()} - $${(+r.job_max_salary).toLocaleString()} ${r.job_salary_period||''}`;
          jobs.push({ title: r.job_title, company: r.employer_name, location: `${r.job_city||''}, ${r.job_state||''}`.replace(/^, |, $/g,''),
            url: r.job_apply_link || r.job_google_link, source: 'JSearch', description: (r.job_description||'').slice(0,500),
            salary: sal, date_posted: (r.job_posted_at_datetime_utc||'').slice(0,10), remote: !!r.job_is_remote,
            lat: r.job_latitude, lon: r.job_longitude });
        }
        if (d.data.length < 10) break;
      }
      return jobs;
    };
  }

  // Jooble (needs key)
  if (cfg.jooble) {
    sources['Jooble'] = async () => {
      let jobs = [];
      for (let p = 1; p <= 3; p++) {
        const d = await fetchProxy(`https://jooble.org/api/${cfg.jooble}`);
        // Jooble is POST-only, proxy doesn't support POST well — try anyway
        if (!d?.jobs) break;
        for (const r of d.jobs) {
          jobs.push({ title: r.title, company: r.company, location: r.location, url: r.link, source: 'Jooble',
            description: (r.snippet||'').slice(0,500), salary: r.salary || '', date_posted: (r.updated||'').slice(0,10) });
        }
        break; // Jooble POST doesn't paginate well via proxy
      }
      return jobs;
    };
  }

  // --- C: ATS Board Crawlers ---

  // Greenhouse (CORS-friendly JSON API)
  sources['Greenhouse (57)'] = async () => {
    const ql = query.toLowerCase();
    const results = await Promise.allSettled(
      GH_BOARDS.map(async board => {
        const d = await fetchJSON(`https://boards-api.greenhouse.io/v1/boards/${board}/jobs`);
        if (!d?.jobs) return [];
        return d.jobs.filter(j => !ql || j.title.toLowerCase().includes(ql)).map(j => ({
          title: j.title, company: board.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
          location: j.location?.name || '', url: j.absolute_url, source: 'Greenhouse',
          date_posted: (j.updated_at||'').slice(0,10),
        }));
      })
    );
    return results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  };

  // Lever (CORS-friendly JSON API)
  sources['Lever (24)'] = async () => {
    const ql = query.toLowerCase();
    const results = await Promise.allSettled(
      LEVER_BOARDS.map(async board => {
        const d = await fetchJSON(`https://api.lever.co/v0/postings/${board}?mode=json`);
        if (!Array.isArray(d)) return [];
        return d.filter(j => !ql || (j.text||'').toLowerCase().includes(ql)).map(j => ({
          title: j.text, company: board.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
          location: j.categories?.location || '', url: j.hostedUrl, source: 'Lever',
          job_type: j.categories?.commitment || '',
        }));
      })
    );
    return results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  };

  // Ashby (GraphQL, CORS-friendly)
  sources['Ashby (10)'] = async () => {
    const ql = query.toLowerCase();
    const results = await Promise.allSettled(
      ASHBY_BOARDS.map(async board => {
        try {
          const r = await fetch('https://jobs.ashbyhq.com/api/non-user-graphql?op=ApiJobBoardWithTeams', {
            method: 'POST', signal: abortController?.signal,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              operationName: 'ApiJobBoardWithTeams',
              variables: { organizationHostedJobsPageName: board },
              query: `query ApiJobBoardWithTeams($organizationHostedJobsPageName: String!) {
                jobBoard: jobBoardWithTeams(organizationHostedJobsPageName: $organizationHostedJobsPageName) {
                  teams { jobs { id title locationName employmentType externalLink } }
                }
              }`
            })
          });
          const d = await r.json();
          const teams = d?.data?.jobBoard?.teams || [];
          return teams.flatMap(t => (t.jobs||[]))
            .filter(j => !ql || j.title.toLowerCase().includes(ql))
            .map(j => ({
              title: j.title, company: board.replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase()),
              location: j.locationName || '', url: j.externalLink || `https://jobs.ashbyhq.com/${board}/${j.id}`,
              source: 'Ashby', job_type: j.employmentType || '',
            }));
        } catch { return []; }
      })
    );
    return results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  };

  // --- Reddit ---
  sources['Reddit'] = async () => {
    const subs = ['forhire','jobbit','hiring','remotejs','ProgrammingJobs','cscareerquestions'];
    const ql = query.toLowerCase();
    const results = await Promise.allSettled(
      subs.map(async sub => {
        const d = await fetchJSON(`https://www.reddit.com/r/${sub}/search.json?q=${encodeURIComponent(query+' '+location+' hiring')}&restrict_sr=on&sort=new&t=month&limit=25`,
          { headers: { 'User-Agent': 'job-finder-static/2.0' } });
        if (!d?.data?.children) return [];
        return d.data.children.filter(p => {
          const t = (p.data?.title||'').toLowerCase();
          return /hiring|job|position|looking for|join|we're/.test(t);
        }).map(p => {
          const pd = p.data;
          let company = '';
          const m = pd.title.match(/\[hiring\]\s*(.+?)[\-–|]/i) || pd.title.match(/^(.+?)\s+(?:is hiring|hiring)/i);
          if (m) company = m[1].trim();
          return {
            title: pd.title?.slice(0,200), company, location,
            url: `https://reddit.com${pd.permalink}`, source: `r/${sub}`,
            description: (pd.selftext||'').slice(0,500),
            date_posted: pd.created_utc ? new Date(pd.created_utc*1000).toISOString().slice(0,10) : '',
          };
        });
      })
    );
    return results.flatMap(r => r.status === 'fulfilled' ? r.value : []);
  };

  return sources;
}

// =========================================================================
//  DEDUP + RADIUS FILTER
// =========================================================================
function fingerprint(j) {
  return `${(j.title||'').toLowerCase().trim()}|${(j.company||'').toLowerCase().trim()}|${(j.location||'').toLowerCase().trim()}`;
}

function dedup(jobs) {
  const fps = new Set(), urls = new Set(), out = [];
  for (const j of jobs) {
    const fp = fingerprint(j);
    const ukey = j.url ? j.url.split('?')[0].replace(/\/$/,'') : '';
    if (fps.has(fp)) continue;
    if (ukey && urls.has(ukey)) continue;
    fps.add(fp); if (ukey) urls.add(ukey);
    out.push(j);
  }
  return out;
}

async function filterByRadius(jobs, center, radiusMi) {
  const locCache = {};
  for (const j of jobs) {
    if (j.lat && j.lon) {
      j.distance_miles = Math.round(haversine(center.lat, center.lon, j.lat, j.lon) * 10) / 10;
      continue;
    }
    const loc = (j.location || '').trim();
    if (!loc || /remote|anywhere|worldwide|distributed/i.test(loc)) {
      j.distance_miles = null; continue;
    }
    if (!(loc in locCache)) locCache[loc] = await geocode(loc);
    const coords = locCache[loc];
    if (!coords) { j.distance_miles = null; continue; }
    j.distance_miles = Math.round(haversine(center.lat, center.lon, coords.lat, coords.lon) * 10) / 10;
  }
  return jobs.filter(j => j.distance_miles === null || j.distance_miles === undefined || j.distance_miles <= radiusMi);
}

// =========================================================================
//  MAIN SEARCH
// =========================================================================
async function startSearch(e) {
  e.preventDefault();
  const query = $('query').value.trim();
  const location = $('location').value.trim();
  const radiusMi = +$('radius').value || 25;
  if (!location) return;

  // Abort previous
  if (abortController) abortController.abort();
  abortController = new AbortController();

  const cfg = saveCfg();
  allJobs = []; filteredJobs = []; currentPage = 0;

  $('searchBtn').disabled = true;
  $('searchBtn').textContent = 'Searching...';
  $('progressArea').classList.add('active');
  $('resultsArea').classList.remove('active');

  // Geocode
  $('progressStatus').innerHTML = '<span class="spinner"></span>Geocoding...';
  const center = await geocode(location);
  if (!center) {
    $('progressStatus').textContent = 'Could not geocode location. Try "City, State" format.';
    $('searchBtn').disabled = false; $('searchBtn').textContent = 'Search';
    return;
  }
  $('progressStatus').innerHTML = `<span class="spinner"></span>Scanning sources... (${center.lat.toFixed(2)}, ${center.lon.toFixed(2)})`;

  const sources = buildSources(query, location, radiusMi, cfg);
  const names = Object.keys(sources);
  const total = names.length;
  let completed = 0;

  // Build source grid
  $('sourceGrid').innerHTML = names.map(n => `<span class="source-tag" id="src-${cssId(n)}">${n}</span>`).join('');
  $('progressCount').textContent = `0 / ${total}`;
  $('progressBar').style.width = '0%';

  // Fire all concurrently, update UI as each completes
  const promises = names.map(async name => {
    const tag = $('src-' + cssId(name));
    if (tag) tag.classList.add('active');
    try {
      const jobs = await sources[name]();
      completed++;
      const count = jobs.length;
      allJobs.push(...jobs);

      if (tag) {
        tag.classList.remove('active');
        tag.classList.add(count > 0 ? 'done' : 'zero');
        tag.textContent = `${name} (${count})`;
      }
      const pct = Math.round((completed / total) * 100);
      $('progressBar').style.width = pct + '%';
      $('progressCount').textContent = `${completed} / ${total} · ${allJobs.length} raw`;
      $('progressStatus').innerHTML = completed < total
        ? `<span class="spinner"></span>${completed}/${total} sources...`
        : 'Processing results...';

      // Live update table
      if (count > 0) {
        filteredJobs = allJobs;
        renderResults();
        $('resultsArea').classList.add('active');
      }

      return jobs;
    } catch (err) {
      completed++;
      if (tag) { tag.classList.remove('active'); tag.classList.add('error'); tag.textContent = `${name} (err)`; }
      $('progressBar').style.width = Math.round((completed / total) * 100) + '%';
      $('progressCount').textContent = `${completed} / ${total} · ${allJobs.length} raw`;
      return [];
    }
  });

  await Promise.allSettled(promises);

  // Dedup
  $('progressStatus').innerHTML = '<span class="spinner"></span>Deduplicating...';
  allJobs = dedup(allJobs);

  // Radius filter
  $('progressStatus').innerHTML = '<span class="spinner"></span>Filtering by radius...';
  allJobs = await filterByRadius(allJobs, center, radiusMi);

  // Sort
  allJobs.sort((a, b) => (a.distance_miles ?? 9999) - (b.distance_miles ?? 9999));
  filteredJobs = allJobs;

  $('progressStatus').textContent = `Done — ${allJobs.length} jobs within ${radiusMi} mi`;
  $('progressBar').style.width = '100%';
  $('searchBtn').disabled = false;
  $('searchBtn').textContent = 'Search';
  renderResults();
  $('resultsArea').classList.add('active');
}

// =========================================================================
//  TABLE RENDERING
// =========================================================================
function renderResults() {
  $('resultCount').textContent = filteredJobs.length;
  const start = currentPage * PAGE_SIZE;
  const page = filteredJobs.slice(start, start + PAGE_SIZE);

  $('jobTableBody').innerHTML = page.map(j => {
    const dist = j.distance_miles != null ? `${j.distance_miles} mi` : '—';
    const rb = j.remote ? '<span class="job-remote">remote</span>' : '';
    const link = j.url
      ? `<a class="job-title-link" href="${esc(j.url)}" target="_blank" rel="noopener">${esc(j.title||'Untitled')}</a>`
      : `<span class="job-title-link">${esc(j.title||'Untitled')}</span>`;
    return `<tr>
      <td>${link}${rb}</td>
      <td class="job-company">${esc(j.company)}</td>
      <td class="job-location">${esc(j.location)}</td>
      <td class="job-salary hide-mobile">${esc(j.salary||'')}</td>
      <td class="job-distance">${dist}</td>
      <td><span class="job-source">${esc(j.source)}</span></td>
    </tr>`;
  }).join('');

  // Pagination
  const totalPages = Math.ceil(filteredJobs.length / PAGE_SIZE);
  const pag = $('pagination');
  if (totalPages <= 1) { pag.innerHTML = ''; return; }
  let h = `<button ${currentPage===0?'disabled':''} onclick="goPage(${currentPage-1})">&laquo;</button>`;
  for (let i = 0; i < totalPages; i++) {
    if (totalPages > 10 && Math.abs(i-currentPage) > 3 && i !== 0 && i !== totalPages-1) {
      if (i === currentPage-4 || i === currentPage+4) h += `<button disabled>...</button>`;
      continue;
    }
    h += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i+1}</button>`;
  }
  h += `<button ${currentPage===totalPages-1?'disabled':''} onclick="goPage(${currentPage+1})">&raquo;</button>`;
  pag.innerHTML = h;
}

function goPage(p) {
  currentPage = p; renderResults();
  window.scrollTo({ top: $('resultsArea').offsetTop - 20, behavior: 'smooth' });
}

function filterResults() {
  const term = $('filterInput').value.toLowerCase();
  filteredJobs = term
    ? allJobs.filter(j => (j.title||'').toLowerCase().includes(term) || (j.company||'').toLowerCase().includes(term)
        || (j.location||'').toLowerCase().includes(term) || (j.source||'').toLowerCase().includes(term)
        || (j.description||'').toLowerCase().includes(term))
    : allJobs;
  currentPage = 0; renderResults();
}

function sortBy(key) {
  if (currentSort.key === key) currentSort.asc = !currentSort.asc;
  else currentSort = { key, asc: true };
  filteredJobs.sort((a, b) => {
    let va = a[key] ?? '', vb = b[key] ?? '';
    if (key === 'distance_miles') { va = va||99999; vb = vb||99999; return currentSort.asc ? va-vb : vb-va; }
    va = String(va).toLowerCase(); vb = String(vb).toLowerCase();
    return currentSort.asc ? va.localeCompare(vb) : vb.localeCompare(va);
  });
  renderResults();
}

// =========================================================================
//  EXPORT
// =========================================================================
function exportCSV() {
  const hdr = ['title','company','location','salary','job_type','date_posted','source','distance_miles','remote','url','description'];
  const rows = filteredJobs.map(j => hdr.map(h => `"${String(j[h]||'').replace(/"/g,'""')}"`).join(','));
  download([hdr.join(','), ...rows].join('\n'), 'jobs.csv', 'text/csv');
}
function exportJSON() { download(JSON.stringify(filteredJobs, null, 2), 'jobs.json', 'application/json'); }
function download(content, filename, type) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type }));
  a.download = filename; a.click(); URL.revokeObjectURL(a.href);
}

// =========================================================================
//  UTILS
// =========================================================================
function $(id) { return document.getElementById(id); }
function cssId(n) { return n.replace(/[^a-zA-Z0-9]/g, '_'); }
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
